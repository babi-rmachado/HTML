<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>
</head>

<body style="color: aquamarine;">
    <table style="width: 100%; border-collapse: collapse;">
        <h1 style="font-size: 80%;">Tabela</h1>
        <p style="text-align: justify;">Forma de organizar as informações, dados em uma estrutura de colunas linhas.</p>
        <!--A tr são as linhas da tabela -->
        <tr>
            <!--A tag th deixa em negrito e centralizada(título)-->
            <th style="border: 1px solid black;">Produto</th>
            <th>Preço</th>
        </tr>
        <!--A tag td deixa o título sem negrito-->
        <tr>
            <th>Esmalte</th>
            <th>R$6,50</th>
        </tr>
        <tr>
            <th>Creme</th>
            <th>R$28,00</th>
        </tr>
    </table>

</body>

</html>
